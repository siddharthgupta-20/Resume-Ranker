# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude (Anthropic)"

ai_usage_summary: |
  Used Claude for architectural discussion, pipeline design, and code review.
  Claude assisted in designing the 3-level skill taxonomy approach, the
  multi-dimension scoring framework, and reviewing module code.
  No candidate data or JD content was fed to any LLM during the ranking phase.
  All API calls are restricted to the pre-computation phase only (taxonomy
  building via claude-sonnet-4-6). The ranking pipeline itself runs fully
  offline with zero network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-dimension weighted scoring pipeline for candidate ranking.

  Module 1 — JD Parser: Extracts structured fields from raw JD text using an
  LLM (required skills, preferred skills, disqualifiers, logistics) into a
  clean JSON schema.

  Module 2 — Taxonomy Engine: Builds a 3-level skill hierarchy (specific →
  concept → umbrella) across all JD and candidate skills using an LLM. Skills
  are enriched before embedding so that "FastAPI" and "Django REST" both map
  to "REST APIs | Backend Development", enabling concept-aware semantic
  matching. Candidate and JD profiles are embedded using sentence-transformers
  (all-MiniLM-L6-v2).

  Module 3 — Scoring Engine: Candidates are scored on three dimensions:
  (1) JD Fit (50%) — cosine similarity of enriched embeddings + required skill
  coverage weighted by proficiency + verified assessment scores;
  (2) Hirability (30%) — interview completion rate, offer acceptance, recruiter
  response rate, notice period fit, location match;
  (3) Intent & Quality (20%) — recency of activity, GitHub score, education
  tier, profile completeness, market validation (saved by recruiters).
  A disqualifier layer applies hard multipliers for consulting-only backgrounds,
  wrong domains, and inactivity. Top 100 candidates are returned sorted by
  final composite score.

